_format_version: "3.0"

services:
  - name: auth-service
    url: https://auth-service-4dni.onrender.com
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

      - name: auth-google-route
        paths:
          - /auth/google
        strip_path: false
        methods:
          - POST
          - OPTIONS
      # RUTAS PARA ADMIN
      - name: auth-users-route
        paths:
          - /auth/users
        strip_path: false
        methods:
          - GET
          - PATCH
          - DELETE
          - OPTIONS
      - name: auth-stats-route
        paths:
          - /auth/stats
        strip_path: false
        methods:
          - GET
          - OPTIONS
      - name: auth-user-id-route
        paths:
          - /auth/users/
        strip_path: false
        methods:
          - GET
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          hour: 500
          policy: local
          fault_tolerant: true

  - name: catalog-service
    url: https://catalog-service-qyir.onrender.com
    routes:
      - name: catalog-route
        paths: [/catalog]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: inventory-service
    url: https://inventory-service-tjva.onrender.com
    routes:
      - name: inventory-route
        paths: [/inventory]
        strip_path: false

  - name: cart-service
    url: https://cart-service-m1xf.onrender.com
    routes:
      - name: cart-route
        paths: [/cart]
        strip_path: false

  - name: order-service
    url: https://order-service-jsti.onrender.com
    routes:
      - name: order-route
        paths: [/orders]
        strip_path: false

  - name: payment-service
    url: https://payment-service-lhx2.onrender.com
    routes:
      - name: payment-route
        paths: [/payments]
        strip_path: false

  - name: shipping-service
    url: https://shipping-service-pwvg.onrender.com
    routes:
      - name: shipping-route
        paths: [/shipping]
        strip_path: false

  - name: notification-service
    url: https://notification-service-1bpn.onrender.com
    routes:
      - name: notification-route
        paths: [/notifications]
        strip_path: false

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
      headers: [Authorization, Content-Type, X-Requested-With]
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      policy: local
      limit_by: ip

  - name: request-transformer
    config:
      remove:
        headers: [x-api-key] # Eliminar cabeceras sensibles que no deben llegar al backend
