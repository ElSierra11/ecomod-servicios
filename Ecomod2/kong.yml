_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:8000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

      - name: auth-google-route
        paths:
          - /auth/google
        strip_path: false
        methods:
          - POST
          - OPTIONS
      # RUTAS PARA ADMIN
      - name: auth-users-route
        paths:
          - /auth/users
        strip_path: false
        methods:
          - GET
          - PATCH
          - DELETE
          - OPTIONS
      - name: auth-stats-route
        paths:
          - /auth/stats
        strip_path: false
        methods:
          - GET
          - OPTIONS
      - name: auth-user-id-route
        paths:
          - /auth/users/
        strip_path: false
        methods:
          - GET
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          hour: 500
          policy: local
          fault_tolerant: true

  - name: catalog-service
    url: http://catalog-service:8001
    routes:
      - name: catalog-route
        paths: [/catalog]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: inventory-service
    url: http://inventory-service:8002
    routes:
      - name: inventory-route
        paths: [/inventory]
        strip_path: false

  - name: cart-service
    url: http://cart-service:8003
    routes:
      - name: cart-route
        paths: [/cart]
        strip_path: false

  - name: order-service
    url: http://order-service:8004
    routes:
      - name: order-route
        paths: [/orders]
        strip_path: false

  - name: payment-service
    url: http://payment-service:8005
    routes:
      - name: payment-route
        paths: [/payments]
        strip_path: false

  - name: shipping-service
    url: http://shipping-service:8006
    routes:
      - name: shipping-route
        paths: [/shipping]
        strip_path: false

  - name: notification-service
    url: http://notification-service:8007
    routes:
      - name: notification-route
        paths: [/notifications]
        strip_path: false

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
      headers: [Authorization, Content-Type, X-Requested-With]
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      policy: local
      limit_by: ip

  - name: request-transformer
    config:
      remove:
        headers: [x-api-key] # Eliminar cabeceras sensibles que no deben llegar al backend

