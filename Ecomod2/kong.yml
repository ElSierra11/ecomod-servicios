_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:8000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: local

  - name: catalog-service
    url: http://catalog-service:8001
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: catalog-route
        paths:
          - /catalog
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: inventory-service
    url: http://inventory-service:8002
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: inventory-route
        paths:
          - /inventory
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: cart-service
    url: http://cart-service:8003
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: cart-route
        paths:
          - /cart
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: order-service
    url: http://order-service:8004
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]

  - name: payment-service
    url: http://payment-service:8005
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]

  - name: shipping-service
    url: http://shipping-service:8006
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: shipping-route
        paths:
          - /shipping
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]

  - name: notification-service
    url: http://notification-service:8007
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: notification-route
        paths:
          - /notifications
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
