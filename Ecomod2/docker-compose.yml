version: "3.8"

services:
  # ─────────────────────────────────────────
  # BASES DE DATOS
  # ─────────────────────────────────────────
  auth-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: authdb
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  catalog-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: catalogdb
    ports:
      - "5434:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  inventory-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: inventorydb
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  cart-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: cartdb
    ports:
      - "5436:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  order-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: orderdb
    ports:
      - "5437:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  payment-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: paymentdb
    ports:
      - "5438:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  shipping-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: shippingdb
    ports:
      - "5439:5432"
    volumes:
      - shipping-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  notification-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: notificationdb
    ports:
      - "5440:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomod-network

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ecomod-network

  # ─────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "8002:8000"
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@auth-db:5432/authdb
      SECRET_KEY: ${SECRET_KEY:-ecomod_secret_dev}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:-ecomod_refresh_secret_dev}
      ALGORITHM: HS256
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  catalog-service:
    build: ./catalog-service
    ports:
      - "8003:8001"
    depends_on:
      catalog-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@catalog-db:5432/catalogdb
      SECRET_KEY: ${SECRET_KEY:-ecomod_secret_dev}
      ALGORITHM: HS256
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/catalog/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  inventory-service:
    build: ./inventory-service
    ports:
      - "8004:8002"
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@inventory-db:5432/inventorydb
      SECRET_KEY: ${SECRET_KEY:-ecomod_secret_dev}
      ALGORITHM: HS256
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/inventory/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  cart-service:
    build: ./cart-service
    ports:
      - "8005:8003"
    depends_on:
      cart-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@cart-db:5432/cartdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/cart/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  order-service:
    build: ./order-service
    ports:
      - "8006:8004"
    depends_on:
      order-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@order-db:5432/orderdb
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/orders/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  payment-service:
    build: ./payment-service
    ports:
      - "8007:8005"
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@payment-db:5432/paymentdb
      ORDER_SERVICE_URL: http://order-service:8004
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8007
      # Stripe (opcional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      # PayPal
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_SECRET_KEY: ${PAYPAL_SECRET_KEY:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/payments/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  shipping-service:
    build: ./shipping-service
    ports:
      - "8008:8006"
    depends_on:
      shipping-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@shipping-db:5432/shippingdb
      NOTIFICATION_SERVICE_URL: http://notification-service:8007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/shipping/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  notification-service:
    build: ./notification-service
    ports:
      - "8009:8007"
    depends_on:
      notification-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@notification-db:5432/notificationdb
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@ecomod.com}
      FROM_NAME: EcoMod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/notifications/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecomod-network

  # ─────────────────────────────────────────
  # KONG API GATEWAY — MODO DECLARATIVO (DB-less)
  # ─────────────────────────────────────────
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8080"
      KONG_ADMIN_GUI_URL: "http://localhost:8080"
      KONG_ADMIN_GUI_API_URL: "http://localhost:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8080:8080"
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ecomod-network
    restart: on-failure

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../Ecomod-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ecomod-network
    depends_on:
      kong:
        condition: service_healthy
    restart: unless-stopped

networks:
  ecomod-network:
    driver: bridge

volumes:
  auth-db-data:
  catalog-db-data:
  inventory-db-data:
  cart-db-data:
  order-db-data:
  payment-db-data:
  shipping-db-data:
  notification-db-data:
