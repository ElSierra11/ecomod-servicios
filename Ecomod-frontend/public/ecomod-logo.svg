<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cfc6e"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Anillo con puntos -->
  <g transform="translate(60, 100)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#grad)" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4"/>
    
    <!-- Puntos orbitando -->
    <circle cx="0" cy="-40" r="3" fill="#7cfc6e" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-30" r="2" fill="#22d3ee" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-20" r="1.5" fill="#a78bfa" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Texto -->
  <g transform="translate(130, 70)">
    <text font-family="'Syne', sans-serif" font-size="56" font-weight="900" letter-spacing="-2" fill="url(#grad)">
      Eco
    </text>
    <text x="78" y="0" font-family="'Syne', sans-serif" font-size="56" font-weight="900" letter-spacing="-2" fill="currentColor">
      Mod
    </text>
    
    <text x="0" y="32" font-family="'DM Sans', monospace" font-size="8" font-weight="600" fill="var(--text3)" letter-spacing="4">
      COMMERCE PLATFORM
    </text>

    <!-- Stats inline -->
    <g transform="translate(0, 48)">
      <rect x="0" y="-6" width="6" height="6" rx="1" fill="#7cfc6e">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="12" y="0" font-family="'DM Sans', monospace" font-size="7" fill="var(--text3)" letter-spacing="1">
        8 MICROSERVICIOS
      </text>
    </g>
  </g>
</svg>