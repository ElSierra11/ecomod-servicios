<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bagGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f43f5e" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="white"/>
  
  <!-- Shopping bag body -->
  <rect x="14" y="24" width="36" height="32" rx="6" fill="url(#bagGradient)" filter="url(#shadow)"/>
  
  <!-- Bag handles -->
  <path d="M22 24 V18 C22 12 26 8 32 8 C38 8 42 12 42 18 V24" 
        stroke="url(#bagGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Lightning bolt -->
  <path d="M35 30 L27 42 L32 42 L30 52 L40 40 L35 40 L38 30 Z" fill="white" opacity="0.95"/>
</svg>
