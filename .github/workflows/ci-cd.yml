name: EcoMod Premium CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Linting y Calidad de Código
  # ─────────────────────────────────────────
  lint:
    name: Linting & Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Linters
        run: pip install flake8 black

      - name: Python Linting (flake8)
        run: |
          flake8 Ecomod2/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 Ecomod2/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend Linting
        run: |
          cd Ecomod-frontend
          npm install
          npm run lint || echo "Linting skipped or not configured"

  # ─────────────────────────────────────────
  # JOB 2: Tests de los microservicios
  # ─────────────────────────────────────────
  test-services:
    name: unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run Tests (pytest)
        run: |
          pip install pytest pytest-asyncio httpx sqlalchemy
          # Intentar correr tests en cada carpeta si existen
          for dir in Ecomod2/*-service; do
            if [ -d "$dir/tests" ]; then
              echo "Ejecutando tests en $dir"
              cd $dir && python -m pytest tests/ -v || exit 1
              cd ../..
            fi
          done

  # ─────────────────────────────────────────
  # JOB 3: Build & Push to GHCR (Docker)
  # ─────────────────────────────────────────
  build-push-ghcr:
    name: Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: test-services
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [auth, catalog, inventory, cart, order, payment, shipping, notification]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Ecomod2/${{ matrix.service }}-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ecomod-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/ecomod-${{ matrix.service }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 4: Deploy to Render (Trigger)
  # ─────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-push-ghcr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Render Deploy (Auth)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}

      - name: Trigger Render Deploy (Catalog)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_CATALOG }}
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_CATALOG }}

      - name: Trigger Render Deploy (Orders)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_ORDERS }}
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ORDERS }}

      # Se pueden añadir hooks para todos los servicios según necesidad

  # ─────────────────────────────────────────
  # JOB 5: Build Frontend (Vercel automatic)
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-services
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: |
          cd Ecomod-frontend
          npm install
          npm run build
