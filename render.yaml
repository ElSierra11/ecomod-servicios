# EcoMod Infrastructure Blueprint (V3 - Final)

# 1. SECCIÓN DE BASES DE DATOS
databases:
  - name: ecomod-db
    databaseName: ecomod
    user: ecomod_user
    plan: free

# 2. SECCIÓN DE SERVICIOS
services:
  # Redis
  - type: redis
    name: ecomod-redis
    ipAllowList: [] 
    plan: free

  # RabbitMQ (Private Service)
  - type: pservice
    name: rabbitmq
    env: docker
    dockerContext: .
    dockerfilePath: ./Ecomod2/rabbitmq.Dockerfile
    plan: starter
    ports:
      - port: 5672
        protocol: TCP
      - port: 15672
        protocol: TCP

  # Auth Service
  - type: pservice
    name: auth-service
    env: docker
    dockerContext: ./Ecomod2/auth-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Catalog Service
  - type: pservice
    name: catalog-service
    env: docker
    dockerContext: ./Ecomod2/catalog-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Inventory Service
  - type: pservice
    name: inventory-service
    env: docker
    dockerContext: ./Ecomod2/inventory-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Cart Service
  - type: pservice
    name: cart-service
    env: docker
    dockerContext: ./Ecomod2/cart-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ecomod-redis
          property: connectionString

  # Order Service
  - type: pservice
    name: order-service
    env: docker
    dockerContext: ./Ecomod2/order-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Payment Service
  - type: pservice
    name: payment-service
    env: docker
    dockerContext: ./Ecomod2/payment-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Shipping Service
  - type: pservice
    name: shipping-service
    env: docker
    dockerContext: ./Ecomod2/shipping-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Notification Service
  - type: pservice
    name: notification-service
    env: docker
    dockerContext: ./Ecomod2/notification-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # API GATEWAY (Público)
  - type: web
    name: ecomod-gateway
    env: docker
    dockerContext: ./Ecomod2
    dockerfilePath: ./Ecomod2/kong.Dockerfile
    plan: starter
    healthCheckPath: /auth/health
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
