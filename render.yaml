# EcoMod Infrastructure Blueprint (V13 - Survival Mode)

databases:
  - name: ecomod-db
    plan: free

services:
  - type: keyvalue
    name: ecomod-redis
    plan: free
    ipAllowList: []

  # Auth Service (Ajustado)
  - type: web
    name: auth-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/auth-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: SECRET_KEY
        value: "ecomod_secret_key_123_change_me" # A veces crashea si esto falta
      - key: RABBITMQ_URL
        value: "amqp://guest:guest@localhost"

  # Catalog Service
  - type: web
    name: catalog-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/catalog-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Inventory Service
  - type: web
    name: inventory-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/inventory-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: "amqp://guest:guest@localhost"

  # Cart Service
  - type: web
    name: cart-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/cart-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ecomod-redis
          property: connectionString

  # Order Service
  - type: web
    name: order-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/order-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: "amqp://guest:guest@localhost"

  # Payment Service
  - type: web
    name: payment-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/payment-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Shipping Service
  - type: web
    name: shipping-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/shipping-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Notification Service
  - type: web
    name: notification-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/notification-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: "amqp://guest:guest@localhost"

  # API GATEWAY (Kong - Simplificado para plan Free)
  - type: web
    name: ecomod-gateway
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/kong.Dockerfile
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
      # Quitamos el KONG_PROXY_LISTEN dinámico y dejamos que Render use el suyo
