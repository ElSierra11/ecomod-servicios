# EcoMod Infrastructure Blueprint (V17 - KONG GATEWAY MODE)

databases:
  - name: ecomod-db
    plan: free

services:
  - type: keyvalue
    name: ecomod-redis
    plan: free
    ipAllowList: []

  # Auth Service
  - type: web
    name: auth-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/auth-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: SECRET_KEY
        value: "ecomod_secret_key_123"
      - key: PORT
        value: "8000"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://notification-service-1bpn.onrender.com"

  # Catalog Service
  - type: web
    name: catalog-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/catalog-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8001"

  # Inventory Service
  - type: web
    name: inventory-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/inventory-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8002"

  # Cart Service
  - type: web
    name: cart-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/cart-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ecomod-redis
          property: connectionString
      - key: PORT
        value: "8003"

  # Order Service
  - type: web
    name: order-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/order-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8004"
      - key: INVENTORY_SERVICE_URL
        value: "https://inventory-service-tjva.onrender.com"
      - key: CART_SERVICE_URL
        value: "https://cart-service-m1xf.onrender.com"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://notification-service-1bpn.onrender.com"

  # Payment Service
  - type: web
    name: payment-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/payment-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8005"
      - key: ORDER_SERVICE_URL
        value: "https://order-service-jsti.onrender.com"

  # Shipping Service
  - type: web
    name: shipping-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/shipping-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8006"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://notification-service-1bpn.onrender.com"

  # Notification Service
  - type: web
    name: notification-service
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/notification-service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: PORT
        value: "8007"

  # API Gateway (Kong)
  - type: web
    name: api-gateway
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: Ecomod2/kong.Dockerfile
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
      - key: KONG_PROXY_LISTEN
        value: 0.0.0.0:10000
      - key: KONG_LOG_LEVEL
        value: debug
