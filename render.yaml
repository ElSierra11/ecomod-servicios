# EcoMod Infrastructure Blueprint (V7 - Validado)

databases:
  - name: ecomod-db
    plan: free # El único que puede ser free

services:
  - type: keyvalue
    name: ecomod-redis
    plan: free

  - type: pserv
    name: rabbitmq
    env: docker
    dockerContext: .
    dockerfilePath: ./Ecomod2/rabbitmq.Dockerfile
    plan: starter # Los pserv REQUIEREN plan starter o superior

  - type: pserv
    name: auth-service
    env: docker
    dockerContext: ./Ecomod2/auth-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: pserv
    name: catalog-service
    env: docker
    dockerContext: ./Ecomod2/catalog-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  - type: pserv
    name: inventory-service
    env: docker
    dockerContext: ./Ecomod2/inventory-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: pserv
    name: cart-service
    env: docker
    dockerContext: ./Ecomod2/cart-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ecomod-redis
          property: connectionString

  - type: pserv
    name: order-service
    env: docker
    dockerContext: ./Ecomod2/order-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: pserv
    name: payment-service
    env: docker
    dockerContext: ./Ecomod2/payment-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: pserv
    name: shipping-service
    env: docker
    dockerContext: ./Ecomod2/shipping-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: pserv
    name: notification-service
    env: docker
    dockerContext: ./Ecomod2/notification-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  - type: web
    name: ecomod-gateway
    env: docker
    dockerContext: ./Ecomod2
    dockerfilePath: ./Ecomod2/kong.Dockerfile
    plan: starter
    healthCheckPath: /auth/health
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
