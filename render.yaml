# EcoMod Infrastructure Blueprint (V8 - Fix IP Allow List)

databases:
  - name: ecomod-db
    plan: free

services:
  # Redis (Requiere IP allow list)
  - type: keyvalue
    name: ecomod-redis
    plan: free
    ipAllowList: [] # Solo accesible internamente

  # RabbitMQ
  - type: pserv
    name: rabbitmq
    env: docker
    dockerContext: .
    dockerfilePath: ./Ecomod2/rabbitmq.Dockerfile
    plan: starter
    ports:
      - port: 5672
        protocol: TCP
      - port: 15672
        protocol: TCP

  # Auth Service
  - type: pserv
    name: auth-service
    env: docker
    dockerContext: ./Ecomod2/auth-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Catalog Service
  - type: pserv
    name: catalog-service
    env: docker
    dockerContext: ./Ecomod2/catalog-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Inventory Service
  - type: pserv
    name: inventory-service
    env: docker
    dockerContext: ./Ecomod2/inventory-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Cart Service
  - type: pserv
    name: cart-service
    env: docker
    dockerContext: ./Ecomod2/cart-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ecomod-redis
          property: connectionString

  # Order Service
  - type: pserv
    name: order-service
    env: docker
    dockerContext: ./Ecomod2/order-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Payment Service
  - type: pserv
    name: payment-service
    env: docker
    dockerContext: ./Ecomod2/payment-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Shipping Service
  - type: pserv
    name: shipping-service
    env: docker
    dockerContext: ./Ecomod2/shipping-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # Notification Service
  - type: pserv
    name: notification-service
    env: docker
    dockerContext: ./Ecomod2/notification-service
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

  # API GATEWAY
  - type: web
    name: ecomod-gateway
    env: docker
    dockerContext: ./Ecomod2
    dockerfilePath: ./Ecomod2/kong.Dockerfile
    plan: starter
    healthCheckPath: /auth/health
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
