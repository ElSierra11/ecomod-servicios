# EcoMod Infrastructure Blueprint (TOTALMENTE GRATIS)

databases:
  - name: ecomod-db
    plan: free

services:
  # Redis (Caché gratuita)
  - type: keyvalue
    name: ecomod-redis
    plan: free
    ipAllowList: []

  # Auth Service
  - type: web
    name: auth-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/auth-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Catalog Service
  - type: web
    name: catalog-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/catalog-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Inventory Service
  - type: web
    name: inventory-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/inventory-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Cart Service
  - type: web
    name: cart-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/cart-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ecomod-redis
          property: connectionString

  # Order Service
  - type: web
    name: order-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/order-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Payment Service
  - type: web
    name: payment-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/payment-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Shipping Service
  - type: web
    name: shipping-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/shipping-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # Notification Service
  - type: web
    name: notification-service
    plan: free
    env: docker
    dockerContext: ./Ecomod2/notification-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomod-db
          property: connectionString

  # API GATEWAY (Kong)
  - type: web
    name: ecomod-gateway
    plan: free
    env: docker
    dockerContext: ./Ecomod2
    dockerfilePath: ./Ecomod2/kong.Dockerfile
    healthCheckPath: /auth/health
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /usr/local/kong/declarative/kong.yml
